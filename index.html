  <!-- ─────────────────────────────────────────────────────────────────── -->
  <title>MyDakota HIS – Childhood Disease Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --primary: #1a2744;
      --accent: #c0392b;
      --accent2: #2471a3;
      --muted: #7f8c8d;
      --border: #ddd8d0;
      --measles: #c0392b;
      --hepa: #d35400;
      --influenza: #7d3c98;
      --rota: #1e8449;
      --rsv: #2471a3;
      --shadow: 0 2px 16px rgba(26,39,68,0.08);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:"DM Sans", sans-serif; background:var(--bg); color:var(--primary); line-height:1.6; overflow-x:hidden; }
    * { min-width: 0; }
    
    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      position: sticky; top:0; z-index:1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.2);
    }
    .header-inner {
      max-width: 1600px; margin:0 auto;
      display: flex; align-items:center; justify-content:space-between;
      padding: 0 24px; height: 64px;
    }
    .logo {
      display:flex; align-items:center; gap:12px;
      font-family:"DM Serif Display", serif;
      font-size:1.4rem; color:white; text-decoration:none;
    }
    .logo-icon {
      width:36px; height:36px; background:#c0392b;
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      font-size:1.1rem;
    }
    .header-subtitle { font-size:0.75rem; opacity:0.6; font-weight:300; margin-top:1px; }
    nav { display:flex; gap:4px; }
    nav a {
      color: rgba(255,255,255,0.7); text-decoration:none;
      padding:8px 14px; border-radius:6px;
      font-size:0.85rem; font-weight:500;
      transition: all 0.2s;
    }
    nav a:hover { color:white; background:rgba(255,255,255,0.1); }

    /* TABS */
    .tabs-wrapper {
      background: var(--primary);
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .tabs-inner {
      max-width:1600px; margin:0 auto; padding:0 24px;
      display:flex; gap:2px; overflow-x:auto;
    }
    .tab-btn {
      padding: 12px 20px; border:none; cursor:pointer;
      font-family:"DM Sans", sans-serif; font-size:0.85rem; font-weight:500;
      color: rgba(255,255,255,0.6); background:transparent;
      border-bottom: 3px solid transparent;
      transition: all 0.2s; white-space:nowrap;
    }
    .tab-btn:hover { color:white; }
    .tab-btn.active { color:white; border-bottom-color: #c0392b; }
    .tab-btn.t-measles.active { border-bottom-color: var(--measles); }
    .tab-btn.t-hepa.active { border-bottom-color: var(--hepa); }
    .tab-btn.t-rota.active { border-bottom-color: var(--rota); }
    .tab-btn.t-rsv.active { border-bottom-color: var(--rsv); }
    .t-influenza.active { border-bottom-color: var(--influenza); }

    /* MAIN */
    main { max-width:1600px; margin:0 auto; padding:24px; }

    /* FILTER BAR */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display:flex; gap:20px; align-items:center; flex-wrap:wrap;
    }
    .filter-bar label { font-weight:600; font-size:0.85rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .filter-bar select {
      border: 1px solid var(--border); border-radius:8px;
      padding:8px 12px; font-family:"DM Sans",sans-serif;
      font-size:0.9rem; background:var(--bg); color:var(--primary);
      cursor:pointer;
    }
    .filter-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:var(--primary); color:white;
      padding:6px 14px; border-radius:20px; font-size:0.8rem; font-weight:500;
      margin-left: auto;
    }

    /* STAT CARDS ROW */
    .stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .stat-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px;
      border-top: 4px solid var(--accent);
    }
    .stat-card.measles { border-top-color: var(--measles); }
    .stat-card.hepa    { border-top-color: var(--hepa); }
    .stat-card.rota    { border-top-color: var(--rota); }
    .stat-card.rsv     { border-top-color: var(--rsv); }
    .stat-label { font-size:0.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
    .stat-value { font-family:"DM Serif Display",serif; font-size:2rem; color:var(--primary); }
    .stat-sub { font-size:0.8rem; color:var(--muted); margin-top:4px; }

    /* GRID */
    .dash-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
    .card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px;
      box-shadow: var(--shadow);
    }
    .card.full { grid-column:1/-1; } .card.span2 { grid-column: span 2; }
    .card.half { grid-column:span 1; }
    .card h3 {
      font-family:"DM Serif Display",serif; font-size:1rem;
      color:var(--primary); margin-bottom:16px;
      padding-bottom:12px; border-bottom:1px solid var(--border);
    }
    .card-subtitle { font-size:0.8rem; color:var(--muted); margin-top:-10px; margin-bottom:14px; }
    canvas { width:100%!important; }
    .chart-wrap {
      position: relative;
      height: 220px;
      width: 100%;
    }
    .chart-wrap.tall { height: 260px; }
    .chart-wrap.short { height: 160px; }
    canvas { display: block; }


    /* MAP */
    #map { height:320px; border-radius:8px; }
    .map-legend {
      display:flex; gap:12px; flex-wrap:wrap; margin-top:10px;
      font-size:0.78rem; color:var(--muted);
    }
    .legend-item { display:flex; align-items:center; gap:5px; }
    .legend-dot { width:12px; height:12px; border-radius:3px; }

    /* METHODOLOGY */
    .method-section {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:36px; max-width:900px;
    }
    .method-section h2 {
      font-family:"DM Serif Display",serif; font-size:1.8rem;
      margin-bottom:24px; color:var(--primary);
    }
    .method-section h3 {
      font-family:"DM Serif Display",serif; font-size:1.1rem;
      margin: 24px 0 10px; color:var(--primary);
      padding-top:20px; border-top:1px solid var(--border);
    }
    .method-section h3:first-of-type { border-top:none; padding-top:0; }
    .method-section p { color:#444; font-size:0.95rem; line-height:1.8; margin-bottom:12px; }
    .method-section ul { padding-left:20px; }
    .method-section li { margin-bottom:8px; font-size:0.95rem; color:#444; line-height:1.7; }
    .pill {
      display:inline-block; background:var(--bg); border:1px solid var(--border);
      border-radius:20px; padding:3px 12px; font-size:0.8rem; margin:3px 3px 3px 0;
      color:var(--primary); font-weight:500;
    }
    .contact-box {
      background:var(--primary); color:white;
      border-radius:10px; padding:20px 24px; margin-top:24px;
      display:flex; align-items:center; gap:16px;
    }
    .contact-box i { font-size:1.5rem; opacity:0.7; }
    .contact-box a { color:#7ec8e3; }

    /* STATEWIDE */
    .statewide-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
    .sw-stat {
      background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:20px; text-align:center;
    }
    .sw-stat .disease-dot {
      width:10px; height:10px; border-radius:50%;
      display:inline-block; margin-right:6px;
    }
    .sw-stat-name { font-size:0.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; }
    .sw-stat-num { font-family:"DM Serif Display",serif; font-size:2.2rem; margin:8px 0 4px; }
    .sw-stat-label { font-size:0.78rem; color:var(--muted); }

    /* TABLE */
    .data-table { width:100%; border-collapse:collapse; font-size:0.85rem; }
    .data-table th {
      background:var(--bg); padding:10px 14px;
      text-align:left; font-weight:600;
      font-size:0.75rem; text-transform:uppercase; letter-spacing:.05em;
      color:var(--muted); border-bottom:2px solid var(--border);
    }
    .data-table td { padding:10px 14px; border-bottom:1px solid var(--border); }
    .data-table tr:last-child td { border-bottom:none; }
    .data-table tr:hover td { background:var(--bg); }
    .badge {
      display:inline-block; padding:2px 10px; border-radius:12px;
      font-size:0.75rem; font-weight:600;
    }

    /* FOOTER */
    footer {
      background:var(--primary); color:rgba(255,255,255,0.7);
      text-align:center; padding:24px; margin-top:40px;
      font-size:0.85rem;
    }
    footer strong { color:white; }
    /* ── RESPONSIVE / MOBILE ─────────────────────────────────────────────── */

    /* Tablet */
    @media (max-width: 1024px) {
      .dash-grid { grid-template-columns: repeat(2, 1fr); }
      .stat-row  { grid-template-columns: repeat(2, 1fr); }
      .statewide-stats { grid-template-columns: repeat(2, 1fr); }
      .card.full { grid-column: 1 / -1; }
    }

    /* Large phone / small tablet */

    /* ── MOBILE TAB DRAWER ─────────────────────────────────── */
    /* Toggle bar — hidden on desktop */
    #tabToggleBar { display: none; }

    @media (max-width: 768px) {

      /* Make the tabs-inner animate open/closed */
      #tabsWrapper { overflow: hidden; }

      .tabs-inner {
        max-height: 0;
        overflow: hidden;
        padding-top: 0 !important;
        padding-bottom: 0 !important;
        transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1),
                    padding    0.35s cubic-bezier(0.4,0,0.2,1);
      }

      #tabsWrapper.tabs-open .tabs-inner {
        max-height: 380px;
        padding-top: 10px !important;
        padding-bottom: 10px !important;
      }

      /* Toggle bar */
      #tabToggleBar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        cursor: pointer;
        user-select: none;
        background: var(--primary);
        border-top: 1px solid rgba(255,255,255,0.12);
        min-height: 42px;
      }

      #tabToggleLabel {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.82rem;
        font-weight: 600;
        color: white;
        letter-spacing: 0.01em;
      }

      #tabToggleLabel i {
        font-size: 0.85rem;
        opacity: 0.9;
      }

      #tabToggleChevron {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: rgba(255,255,255,0.12);
        color: rgba(255,255,255,0.8);
        font-size: 0.72rem;
        transition: transform 0.3s ease, background 0.2s;
        flex-shrink: 0;
      }

      #tabsWrapper.tabs-open #tabToggleChevron {
        transform: rotate(180deg);
        background: rgba(255,255,255,0.22);
      }

      /* Active tab name gets accent colour in toggle bar */
      #tabToggleLabel.t-measles   { color: var(--measles); }
      #tabToggleLabel.t-hepa      { color: var(--hepa); }
      #tabToggleLabel.t-influenza { color: var(--influenza); }
      #tabToggleLabel.t-rota      { color: var(--rota); }
      #tabToggleLabel.t-rsv       { color: var(--rsv); }

      /* Separator line between toggle bar and open drawer */
      #tabsWrapper.tabs-open #tabToggleBar {
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }

    }

    @media (max-width: 768px) {
      /* Header */
      .header-inner { padding: 0 14px; height: auto; min-height: 56px; flex-wrap: wrap; gap: 6px; padding-top: 10px; padding-bottom: 10px; }
      .logo { font-size: 1.1rem; }
      .logo-icon { width: 30px; height: 30px; font-size: 0.9rem; }
      .header-subtitle { font-size: 0.65rem; }
      nav { gap: 2px; }
      nav a { padding: 6px 8px; font-size: 0.75rem; }

      /* Tabs — 2-column wrapping grid */
      .tabs-inner {
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 12px;
        overflow: visible;
      }
      .tab-btn {
        flex: 0 0 calc(50% - 4px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 5px;
        padding: 10px 6px;
        font-size: 0.73rem;
        white-space: normal;
        text-align: center;
        line-height: 1.3;
        border-radius: 8px;
        border-bottom: 3px solid transparent;
        background: rgba(255,255,255,0.07);
        min-height: 54px;
      }
      .tab-btn i {
        display: block;
        font-size: 1rem;
        margin: 0;
      }
      .tab-btn:hover { background: rgba(255,255,255,0.13); }
      .tab-btn.active { background: rgba(255,255,255,0.15); }
      .tab-btn.t-measles.active   { background: rgba(192,57,43,0.28); }
      .tab-btn.t-hepa.active      { background: rgba(211,84,0,0.28); }
      .tab-btn.t-influenza.active { background: rgba(125,60,152,0.28); }
      .tab-btn.t-rota.active      { background: rgba(30,132,73,0.28); }
      .tab-btn.t-rsv.active       { background: rgba(36,113,163,0.28); }

      /* Main padding */
      main { padding: 16px 12px; }

      /* Filter bar */
      .filter-bar { flex-direction: column; align-items: stretch; gap: 12px; padding: 14px; }
      .filter-group, .ctrl-group { flex-wrap: wrap; gap: 6px; }
      .filter-bar select, .filter-bar input { min-width: 0; width: 100%; }
      .filter-badge { margin-left: 0; align-self: flex-start; }

      /* Stat cards */
      .stat-row { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 14px; }
      .stat-value { font-size: 1.6rem; }

      /* Dashboard grid */
      .dash-grid { grid-template-columns: 1fr; gap: 14px; }
      .card.full, .card { grid-column: 1; }
      .card[style*="grid-column:span 2"] { grid-column: 1 !important; }
      .card[style*="span 2"] { grid-column: 1 !important; }

      /* Charts */
      .chart-wrap { height: 200px; }
      .chart-wrap.tall { height: 220px; }
      .chart-wrap.short { height: 160px; }
      canvas { max-width: 100% !important; }

      /* Map */
      #map { height: 260px; }

      /* Statewide */
      .statewide-stats { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .sw-stat { padding: 14px; }
      .sw-stat-num { font-size: 1.8rem; }

      /* Methodology */
      .method-section { padding: 20px; }
      .method-section h2 { font-size: 1.4rem; }
      .contact-box { flex-direction: column; gap: 10px; }

      /* Table */
      .data-table { font-size: 0.78rem; }
      .data-table th, .data-table td { padding: 8px 10px; }

      /* Map legend */
      .map-legend { gap: 8px; font-size: 0.72rem; }
    }

    /* Small phones */
    @media (max-width: 480px) {
      .header-inner { padding: 8px 12px; }
      .logo { font-size: 1rem; gap: 8px; }
      .logo-icon { width: 28px; height: 28px; font-size: 0.8rem; flex-shrink: 0; }
      .header-subtitle { display: none; }
      nav a span, nav a { font-size: 0.72rem; padding: 5px 7px; }

      .tabs-inner { padding: 8px 10px; gap: 7px; }
      .tab-btn {
        flex: 0 0 calc(50% - 3.5px);
        font-size: 0.68rem;
        padding: 9px 5px;
        min-height: 50px;
        gap: 4px;
      }
      .tab-btn i { font-size: 0.9rem; }

      main { padding: 12px 10px; }

      .stat-row { grid-template-columns: 1fr 1fr; gap: 8px; }
      .stat-value { font-size: 1.4rem; }
      .stat-label { font-size: 0.68rem; }
      .stat-sub { font-size: 0.7rem; }

      .chart-wrap { height: 180px; }
      .chart-wrap.tall { height: 200px; }
      #map { height: 220px; }

      .filter-bar { padding: 12px; gap: 10px; }
      .filter-bar label { font-size: 0.72rem; }
      .filter-bar select { font-size: 0.82rem; padding: 7px 10px; }

      .card { padding: 14px; }
      .card h3 { font-size: 0.9rem; }

      .statewide-stats { grid-template-columns: 1fr 1fr; }
      .sw-stat-num { font-size: 1.5rem; }
    

      .card.full { grid-column:1; }
    }
  
    /* ── RISK MODEL SECTION ─────────────────────────────────────────────── */
    .risk-section { margin-top: 32px; }
    .risk-panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .risk-section-header {
      display: flex; align-items: center; gap: 14px;
      background: linear-gradient(135deg, #1a2744 0%, #243660 100%);
      color: white;
      padding: 18px 24px; margin-bottom: 0;
    }
    .risk-section-header h2 { font-family:"DM Serif Display",serif; font-size:1.3rem; margin:0; color:white; }
    .risk-section-header p  { font-size:0.8rem; opacity:0.7; margin:4px 0 0; }
    .risk-badge { background: #c0392b; color: white; font-size:0.7rem; font-weight:700; padding:3px 10px; border-radius:12px; letter-spacing:.06em; text-transform:uppercase; flex-shrink:0; }
    .risk-formula-bar {
      background: #f0ede8; border-top: 1px solid rgba(0,0,0,0.1);
      padding: 12px 24px; font-size: 0.82rem; color: var(--muted);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .risk-formula-bar code { background: white; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: 0.82rem; color: var(--primary); font-family: monospace; }
    .risk-stat-row {
      display: grid; grid-template-columns: repeat(4,1fr); gap: 14px;
      padding: 20px 24px; background: white;
      border-top: 1px solid var(--border);
    }
    .risk-grid {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 20px;
      padding: 20px 24px 24px; background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .risk-stat-card { background: var(--bg); border-radius: 10px; padding: 16px; border-left: 4px solid var(--accent); }
    .risk-stat-card.high  { border-left-color: #c0392b; }
    .risk-stat-card.med   { border-left-color: #d68910; }
    .risk-stat-card.low   { border-left-color: #1e8449; }
    .risk-stat-card.info  { border-left-color: #2471a3; }
    .risk-stat-label { font-size:0.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin-bottom:5px; }
    .risk-stat-value { font-family:"DM Serif Display",serif; font-size:1.7rem; color:var(--primary); }
    .risk-stat-sub   { font-size:0.75rem; color:var(--muted); margin-top:3px; }
    .risk-level-badge { display:inline-block; padding:2px 10px; border-radius:10px; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .risk-level-badge.critical { background:#fde8e8; color:#c0392b; }
    .risk-level-badge.high     { background:#fef3cd; color:#d68910; }
    .risk-level-badge.moderate { background:#d1ecf1; color:#2471a3; }

// ── DATA PROCESSING ───────────────────────────────────────────────────────
function processRows(rows, yearFilter, countyFilter) {
  yearFilter = yearFilter || 'all';
  countyFilter = countyFilter || [];
  let filtered = rows.filter(r => r.County && r.Cases);
  if (yearFilter !== 'all') filtered = filtered.filter(r => r.Date && r.Date.startsWith(yearFilter));
  if (countyFilter.length) filtered = filtered.filter(r => countyFilter.includes(r.County));

  const countyTotal = {}, monthTotal = {}, genderCount = {Male:0, Female:0}, raceCount = {};
  filtered.forEach(r => {
    const cases = Number(r.Cases) || 0;
    if (!cases) return;
    countyTotal[r.County] = (countyTotal[r.County] || 0) + cases;
    const month = r.Date ? r.Date.substring(0, 7) : 'Unknown';
    monthTotal[month] = (monthTotal[month] || 0) + cases;
    if (r.Gender === 'Male') genderCount.Male += cases;
    else if (r.Gender === 'Female') genderCount.Female += cases;
    const race = r.Race || 'Unknown';
    raceCount[race] = (raceCount[race] || 0) + cases;
  });

  const months = Object.keys(monthTotal).sort();
  const total = Object.values(countyTotal).reduce((a, b) => a + b, 0);
  const peakIdx = months.reduce((best, m, i) => monthTotal[m] > monthTotal[months[best]] ? i : best, 0);

  return {
    countyTotal, months, monthCases: months.map(m => monthTotal[m]),
    genderLabels: ['Male', 'Female'], genderData: [genderCount.Male, genderCount.Female],
    raceLabels: Object.keys(raceCount), raceData: Object.values(raceCount),
    total, peakMonth: months[peakIdx] || '—'
  };
}

function processVacc(diseaseName, yearFilter) {
  yearFilter = yearFilter || 'all';
  let rows = SHEET_DATA.Vaccination_Coverage.filter(r => r.Disease === diseaseName && r.Coverage_Rate);
  if (yearFilter !== 'all') rows = rows.filter(r => r.Date && r.Date.startsWith(yearFilter));
  const byGender = {}, byRace = {};
  rows.forEach(r => {
    const g = r.Gender || 'Unknown';
    if (!byGender[g]) byGender[g] = {sum:0, n:0};
    byGender[g].sum += r.Coverage_Rate; byGender[g].n++;
    const race = r.Race || 'Unknown';
    if (!byRace[race]) byRace[race] = {sum:0, n:0};
    byRace[race].sum += r.Coverage_Rate; byRace[race].n++;
  });
  const avg = rows.length ? (rows.reduce((a, r) => a + r.Coverage_Rate, 0) / rows.length) : 0;
  return {
    genderLabels: Object.keys(byGender),
    genderData: Object.keys(byGender).map(g => +(byGender[g].sum / byGender[g].n).toFixed(1)),
    raceLabels: Object.keys(byRace),
    raceData: Object.keys(byRace).map(r => +(byRace[r].sum / byRace[r].n).toFixed(1)),
    avg: avg.toFixed(1)
  };
}

// ── CHART HELPERS ─────────────────────────────────────────────────────────
function destroyChart(id) {
  const c = Chart.getChart(id);
  if (c) c.destroy();
}

function makeChart(id, config) {
  destroyChart(id);
  const el = document.getElementById(id);
  if (!el) return;
  return new Chart(el, config);
}

// ── MAP ───────────────────────────────────────────────────────────────────
function destroyMap() {
  if (leafletMap) { leafletMap.remove(); leafletMap = null; countyLayer = null; }
}

function initMap(countyData, color) {
  const mapEl = document.getElementById('map');
  if (!mapEl) return;

  // Always create fresh instance
  destroyMap();
  leafletMap = L.map('map', { zoomControl: true }).setView([47.4, -100.5], 6);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CartoDB', maxZoom: 19
  }).addTo(leafletMap);

  renderMapLayer(countyData, color);
  setTimeout(() => leafletMap && leafletMap.invalidateSize(), 200);
}

function renderMapLayer(countyData, color) {
  if (!leafletMap) return;
  if (countyLayer) { leafletMap.removeLayer(countyLayer); countyLayer = null; }

  const max = Math.max(...Object.values(countyData), 1);
  function getColor(n) {
    const t = n / max;
    const lerp = (a, b) => Math.round(a + (b - a) * t);
    return `rgb(${lerp(255,189)},${lerp(237,0)},${lerp(160,38)})`;
  }

  countyLayer = L.geoJSON(ND_COUNTY_GEOJSON, {
    style: feature => {
      const name = feature.properties.NAME;
      const val = countyData[name] || 0;
      return { fillColor: getColor(val), color: '#fff', weight: 1.5, fillOpacity: 0.75 };
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.NAME;
      const val = countyData[name] || 0;
      layer.bindPopup(`<b>${name} County</b><br>Cases: <b>${val.toLocaleString()}</b>`);
      layer.on('mouseover', function() { this.setStyle({ weight: 3, fillOpacity: 0.9 }); });
      layer.on('mouseout', function() { leafletMap && countyLayer && countyLayer.resetStyle(this); });
    }
  }).addTo(leafletMap);
}

// ── TOP COUNTIES TABLE ────────────────────────────────────────────────────
function topCountiesTable(countyTotal, color) {
  const sorted = Object.entries(countyTotal).sort((a, b) => b[1] - a[1]).slice(0, 10);
  const max = sorted[0] ? sorted[0][1] : 1;
  return `<table class="data-table">
    <thead><tr><th>#</th><th>County</th><th>Cases</th><th>Share</th></tr></thead>
    <tbody>
    ${sorted.map(([county, cases], i) => `
      <tr>
        <td style="color:var(--muted)">${i + 1}</td>
        <td><strong>${county}</strong></td>
        <td>${cases.toLocaleString()}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:${Math.round(cases/max*100)}px;height:6px;border-radius:3px;background:${color}"></div>
            <span style="font-size:0.8rem;color:var(--muted)">${(cases/max*100).toFixed(0)}%</span>
          </div>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ── REFRESH DISEASE CHARTS & MAP ──────────────────────────────────────────
function refreshDisease(diseaseKey) {
  const cfg = diseaseConfig[diseaseKey];
  const rows = SHEET_DATA[cfg.key];
  const year = document.getElementById('yearFilter') ? document.getElementById('yearFilter').value : 'all';
  const countyEl = document.getElementById('countyFilter');
  const countyFilter = (countyEl && countyEl.value !== 'all') ? [countyEl.value] : [];

  const proc = processRows(rows, year, countyFilter);
  const vacc = processVacc(cfg.vaccName, year);

  // Update stat cards
  document.getElementById('statTotal').textContent = proc.total.toLocaleString();
  document.getElementById('statCounties').textContent = Object.keys(proc.countyTotal).length;
  document.getElementById('statVacc').textContent = vacc.avg + '%';
  document.getElementById('statPeak').textContent = proc.peakMonth;

  // Monthly trend
  makeChart('trendChart', {
    type: 'line',
    data: { labels: proc.months, datasets: [{ label: 'Cases', data: proc.monthCases,
      borderColor: cfg.color, backgroundColor: cfg.color + '22', fill: true, tension: 0.4, pointRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { grid: { display: false } }, y: { beginAtZero: true } } }
  });

  // Gender doughnut
  makeChart('genderChart', {
    type: 'doughnut',
    data: { labels: proc.genderLabels, datasets: [{ data: proc.genderData,
      backgroundColor: ['#2471a3','#c0392b'], borderWidth: 0 }] },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
  });

  // Race bar
  makeChart('raceChart', {
    type: 'bar',

// ── RISK MODEL DASHBOARD ──────────────────────────────────────────────────
function getRiskLevel(score) {
  if (score >= 500) return { label:'Critical', cls:'critical', color:'#c0392b' };
  if (score >= 200) return { label:'High',     cls:'high',     color:'#d68910' };
  if (score >= 80)  return { label:'Moderate', cls:'moderate', color:'#2471a3' };
  return                   { label:'Low',      cls:'low',      color:'#1e8449' };
}

function renderRiskDashboard(diseaseKey, countyFilter) {
  const cfg  = diseaseConfig[diseaseKey];
  const dname = cfg.vaccName; // 'Measles', 'Hepatitis A', 'Influenza', etc.

  // Build risk array from RISK_DATA
  let riskArr = Object.entries(RISK_DATA)
    .map(([county, diseases]) => {
      const d = diseases[dname];
      if (!d) return null;
      return { county, ...d };
    })
    .filter(Boolean);

  // Apply county filter
  if (countyFilter && countyFilter.length) {
    riskArr = riskArr.filter(r => countyFilter.includes(r.county));
  }

  if (!riskArr.length) return '<p style="padding:20px;color:var(--muted)">No risk data available for current filter.</p>';

  riskArr.sort((a,b) => b.risk_score - a.risk_score);
  const top10 = riskArr.slice(0, 10);

  const totalRisk    = riskArr.reduce((s,r) => s+r.risk_score, 0);
  const avgRisk      = totalRisk / riskArr.length;
  const maxRisk      = riskArr[0].risk_score;
  const highRiskCnt  = riskArr.filter(r => r.risk_score >= 200).length;
  const avgUnvacc    = (riskArr.reduce((s,r) => s+r.unvacc_pct, 0) / riskArr.length).toFixed(1);

  const overallLevel = getRiskLevel(avgRisk);

  return `
  <div class="risk-section">
  <div class="risk-panel">
    <div class="risk-section-header">
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
          <h2><i class="fas fa-biohazard" style="margin-right:8px;opacity:0.8"></i>Infection Risk Transmission Model</h2>
          <span class="risk-badge">Model</span>
        </div>
      </div>
    </div>
    <div class="risk-stat-row">
      <div class="risk-stat-card high">
        <div class="risk-stat-label">Statewide Avg Risk Score</div>
        <div class="risk-stat-value">${avgRisk.toFixed(0)}</div>
        <div class="risk-stat-sub"><span class="risk-level-badge ${overallLevel.cls}">${overallLevel.label}</span></div>
      </div>
      <div class="risk-stat-card info">
        <div class="risk-stat-label">Highest County Risk</div>
        <div class="risk-stat-value">${maxRisk.toFixed(0)}</div>
        <div class="risk-stat-sub">${riskArr[0].county} County</div>
      </div>
      <div class="risk-stat-card med">
        <div class="risk-stat-label">High-Risk Counties</div>
        <div class="risk-stat-value">${highRiskCnt}</div>
        <div class="risk-stat-sub">Score ≥ 200</div>
      </div>
      <div class="risk-stat-card low">
        <div class="risk-stat-label">Avg Unvaccinated Pop.</div>
        <div class="risk-stat-value">${avgUnvacc}%</div>
        <div class="risk-stat-sub">Across all counties</div>
      </div>
    </div>

    <div class="risk-grid">
      <!-- Chart 1: Top 10 counties by risk score -->
      <div class="card span2">
        <h3><i class="fas fa-chart-bar" style="color:var(--accent);margin-right:8px"></i>Top 10 Counties by Risk Score</h3>
        <div class="chart-wrap tall"><canvas id="riskBarChart"></canvas></div>
      </div>

      <!-- Chart 2: Risk level distribution -->
      <div class="card">
        <h3><i class="fas fa-chart-pie" style="color:var(--accent2);margin-right:8px"></i>Risk Level Distribution</h3>
        <div class="chart-wrap tall"><canvas id="riskPieChart"></canvas></div>
      </div>

      <!-- Chart 3: Risk vs Coverage scatter -->

        <div class="chart-wrap tall"><canvas id="riskScatterChart"></canvas></div>
      </div>

      <!-- Chart 4: Unvaccinated % bar -->
      <div class="card">
        <h3><i class="fas fa-user-slash" style="color:#d68910;margin-right:8px"></i>Unvaccinated % — Top 10 Counties</h3>
        <div class="chart-wrap tall"><canvas id="unvaccChart"></canvas></div>
      </div>

      <!-- Table: Full county risk ranking -->
      <div class="card full">

          <table class="risk-county-table">

              <tr>
                <th>#</th><th>County</th>
                <th>Risk Score</th><th>Risk Level</th>

function renderRiskCharts(diseaseKey, countyFilter) {
  const cfg   = diseaseConfig[diseaseKey];
  const dname = cfg.vaccName;

  let riskArr = Object.entries(RISK_DATA)
    .map(([county, diseases]) => {
      const d = diseases[dname]; if (!d) return null;
      return { county, ...d };
    }).filter(Boolean);
  if (countyFilter && countyFilter.length) riskArr = riskArr.filter(r => countyFilter.includes(r.county));
  riskArr.sort((a,b) => b.risk_score - a.risk_score);
  const top10 = riskArr.slice(0, 10);

  // Chart 1: Top 10 risk bar
  const riskColors = top10.map(r => getRiskLevel(r.risk_score).color);
  makeChart('riskBarChart', {
    type:'bar',
    data:{ labels:top10.map(r=>r.county), datasets:[{ label:'Risk Score', data:top10.map(r=>r.risk_score), backgroundColor:riskColors, borderRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} },
      scales:{ x:{grid:{display:false}}, y:{beginAtZero:true, title:{display:true,text:'Risk Score'}} } }
  });

  // Chart 2: Risk level distribution pie
  const levels = { Critical:0, High:0, Moderate:0, Low:0 };
  riskArr.forEach(r => { levels[getRiskLevel(r.risk_score).label]++; });
  makeChart('riskPieChart', {
    type:'doughnut',
    data:{ labels:Object.keys(levels), datasets:[{ data:Object.values(levels), backgroundColor:['#c0392b','#d68910','#2471a3','#1e8449'], borderWidth:0 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{position:'bottom', labels:{boxWidth:12}} } }
  });

  // Chart 3: Risk vs Coverage scatter
  makeChart('riskScatterChart', {
    type:'scatter',
    data:{ datasets:[{
      label:'County Risk', pointRadius:5,
      data: riskArr.map(r=>({ x:r.avg_coverage, y:r.risk_score, label:r.county })),
      backgroundColor: riskArr.map(r => getRiskLevel(r.risk_score).color + 'cc'),
      borderColor: riskArr.map(r => getRiskLevel(r.risk_score).color),
      borderWidth:1
    }]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: ctx => `${ctx.raw.label}: Risk ${ctx.raw.y.toFixed(0)}, Coverage ${ctx.raw.x}%` } } },
      scales:{
        x:{ title:{display:true, text:'Avg Vaccination Coverage (%)'}, min:60, max:100 },
        y:{ title:{display:true, text:'Risk Score'}, beginAtZero:true }
      }
    }
  });

  // Chart 4: Unvaccinated % top 10
  const unvColors = top10.map(r => r.unvacc_pct > 20 ? '#c0392b' : r.unvacc_pct > 15 ? '#d68910' : '#1e8449');
  makeChart('unvaccChart', {
    type:'bar',
    data:{ labels:top10.map(r=>r.county), datasets:[{ label:'Unvaccinated %', data:top10.map(r=>r.unvacc_pct), backgroundColor:unvColors, borderRadius:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{display:false} },
      scales:{ x:{beginAtZero:true, max:50, title:{display:true,text:'% Unvaccinated'}}, y:{grid:{display:false}} } }
  });
}

  const btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (tab === 'methodology') renderMethodology();

  else if (tab === 'measles') renderMeasles();
  else renderDisease(tab);
});

// ── MOBILE TAB DRAWER ────────────────────────────────────────────────────
(function() {
  var wrapper  = document.getElementById('tabsWrapper');
  var label    = document.getElementById('tabToggleLabel');
  var open     = false; // start collapsed — user sees toggle bar on load

  // Map of data-tab → display info for the toggle bar label
  var TAB_META = {
    methodology: { icon: 'fa-book-open',        text: 'Methodology',             cls: '' },
    statewide:   { icon: 'fa-map-marked-alt',   text: 'Statewide & Countrywide', cls: '' },
    measles:     { icon: 'fa-virus',             text: 'Measles',                 cls: 't-measles'   },
    hepa:        { icon: 'fa-syringe',           text: 'Hepatitis A',             cls: 't-hepa'      },
    influenza:   { icon: 'fa-head-side-cough',   text: 'Influenza',               cls: 't-influenza' },
    rota:        { icon: 'fa-bacteria',          text: 'Rotavirus',               cls: 't-rota'      },
    rsv:         { icon: 'fa-lungs-virus',       text: 'RSV',                     cls: 't-rsv'       },
  };

  function updateToggleLabel(tabKey) {
    if (!label) return;
    var m = TAB_META[tabKey] || { icon: 'fa-circle', text: tabKey, cls: '' };
    label.innerHTML = '<i class="fas ' + m.icon + '"></i> ' + m.text;
    label.className = m.cls;
  }

  window.toggleTabDrawer = function() {
    if (window.innerWidth > 768) return;
    var scrollY = window.scrollY || window.pageYOffset;
    if (!open && scrollY > 10) {
      // Scroll to top first, then open drawer once we arrive
      window.scrollTo({ top: 0, behavior: 'smooth' });
      var waited = 0;
      var poll = setInterval(function() {
        waited += 16;
        var y = window.scrollY || window.pageYOffset;
        if (y <= 10 || waited > 600) {
          clearInterval(poll);
          open = true;
          if (wrapper) wrapper.classList.add('tabs-open');
        }
      }, 16);
    } else {
      // Already at top (or closing) — toggle immediately
      open = !open;
      if (wrapper) wrapper.classList.toggle('tabs-open', open);
    }
  };

  // Auto-collapse on scroll down (mobile only)
  var lastY = 0;
  window.addEventListener('scroll', function() {
    if (window.innerWidth > 768) return;
    var y = window.scrollY || window.pageYOffset;
    if (y > lastY && y > 60 && open) {
      // scrolling down — collapse
      open = false;
      if (wrapper) wrapper.classList.remove('tabs-open');
    }
    lastY = y;
  }, { passive: true });

  // Hook into tab selection to update label and close drawer
  var originalListener = document.getElementById('tabContainer');
  if (originalListener) {
    originalListener.addEventListener('click', function(e) {
      var btn = e.target.closest('.tab-btn');
      if (!btn) return;
      var tabKey = btn.dataset.tab;
      updateToggleLabel(tabKey);
      // Close drawer after a short delay so tap feels responsive
      if (window.innerWidth <= 768 && open) {
        setTimeout(function() {
          open = false;
          if (wrapper) wrapper.classList.remove('tabs-open');
        }, 180);
      }
    });
  }

  // Set initial label to whichever tab is active on load
  var activeBtn = document.querySelector('.tab-btn.active');
  if (activeBtn) updateToggleLabel(activeBtn.dataset.tab);
})();

  // ── MAP ────────────────────────────────────────────────────────────────────
  let measlesMapObj=null;
  let measlesMapYear='2025';

  function getMeaslesColor(cases) {
    if(!cases) return '#f5f5f5';
    if(cases>=16) return '#c0392b';
    if(cases>=6)  return '#ef9a9a';
    if(cases>=2)  return '#ffcc80';
    return '#fff3e0';
  }

  window.switchMeaslesMap=function(yr) {
    measlesMapYear=yr;
    ['2025','2026','All'].forEach(function(y){
      var btn=document.getElementById('mapBtn'+y);
      if(btn) btn.classList.toggle('active',y.toLowerCase()===yr);
    });
    buildMeaslesLayer();
  };

  function buildMeaslesLayer() {
    if(!measlesMapObj) return;
    measlesMapObj.eachLayer(function(l){if(l.options&&l.options.isMeaslesCounty) measlesMapObj.removeLayer(l);});
    L.geoJSON(ND_COUNTY_GEOJSON,{
      style:function(f) {
        var name=f.properties.NAME;
        var cases=0;
        var cd=MEASLES_COUNTY[name];
        if(cd) {
          if(measlesMapYear==='all') cases=(cd['2025']||0)+(cd['2026']||0);
          else cases=cd[measlesMapYear]||0;
        }
        return {fillColor:getMeaslesColor(cases),weight:1,color:'#999',fillOpacity:cases?0.85:0.2};
      },
      onEachFeature:function(f,layer) {
        layer.options.isMeaslesCounty=true;
        var name=f.properties.NAME;
        var cd=MEASLES_COUNTY[name];
        var c25=cd?cd['2025']||0:0, c26=cd?cd['2026']||0:0;
        var shown=measlesMapYear==='all'?c25+c26:measlesMapYear==='2025'?c25:c26;
        layer.bindTooltip('<strong>'+name+' County</strong><br>Cases shown: '+shown+'<br>2025: '+c25+' · 2026: '+c26,{sticky:true});
      }
    }).addTo(measlesMapObj);
  }

  setTimeout(function(){
    var el=document.getElementById('measlesMap');
    if(el){
      measlesMapObj=L.map('measlesMap',{zoomControl:true,scrollWheelZoom:false}).setView([47.5,-100.5],6);
      L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO'}).addTo(measlesMapObj);
      buildMeaslesLayer();
    }
  },100);
